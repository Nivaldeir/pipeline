name: Build and push Docker image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: nivaldeir/pipeline-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Debug secrets presence
        run: |
          echo "Has username: ${{ secrets.DOCKERHUB_USERNAME != '' }}"
          echo "Has token: ${{ secrets.DOCKERHUB_TOKEN != '' }}"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Trigger Portainer webhook
        if: success() && vars.PORTAINER_WEBHOOK_URL != ''
        run: |
          curl -X POST "${{ vars.PORTAINER_WEBHOOK_URL }}"
